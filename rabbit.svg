<svg xmlns="http://www.w3.org/2000/svg" width="200" height="220" viewBox="0 0 200 220" shape-rendering="crispEdges">
<defs>
  <style>
    .rabbit-body {
      animation: hop 0.6s ease-in-out infinite alternate;
      transform-origin: 100px 200px;
    }
    .ear-left {
      animation: ear-left-wiggle 1.2s ease-in-out infinite;
      transform-origin: 60px 50px;
    }
    .ear-right {
      animation: ear-right-wiggle 1.2s ease-in-out infinite;
      transform-origin: 110px 50px;
    }
    .shadow {
      animation: shadow-pulse 0.6s ease-in-out infinite alternate;
      transform-origin: 100px 210px;
    }
    @keyframes hop {
      0%   { transform: translateY(0px);   }
      40%  { transform: translateY(-18px) scaleX(0.97); }
      60%  { transform: translateY(-22px); }
      100% { transform: translateY(-4px);  }
    }
    @keyframes ear-left-wiggle {
      0%,100% { transform: rotate(0deg);   }
      30%     { transform: rotate(-8deg);  }
      70%     { transform: rotate(5deg);   }
    }
    @keyframes ear-right-wiggle {
      0%,100% { transform: rotate(0deg);  }
      30%     { transform: rotate(8deg);  }
      70%     { transform: rotate(-5deg); }
    }
    @keyframes shadow-pulse {
      0%   { transform: scaleX(1);    opacity: 0.4; }
      100% { transform: scaleX(0.7); opacity: 0.2; }
    }
  </style>
  <filter id="soft-glow">
    <feGaussianBlur stdDeviation="1" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Ground shadow -->
<ellipse class="shadow" cx="100" cy="214" rx="90" ry="5" fill="#00AA44" opacity="0.35"/>

<!-- Grass rows (static, outside animation) -->
